<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Energetic Exotics Portal — Wireframes</title>
    <link rel="stylesheet" href="wireframes/wireframes.css" />
    <script src="marker.js"></script>
  </head>
  <body class="wf-page-shell">
    <header class="wf-nav-bar">
      <a class="wf-logo" href="index.html">
        <img src="../public/company-logo.svg" alt="Energetic Exotics" />
      </a>
    </header>

    <main class="wf-layout wf-layout-wide">
      <div class="wf-page-intro wf-page-intro-center wf-page-intro-spacious">
        <p class="wf-accent">Energetic Exotics Portal</p>
        <h1 class="wf-page-title">Select Portal</h1>
      </div>

      <div class="wf-choice-grid">
        <div class="wf-choice-card">
          <h2>Driver Dashboard</h2>
          <p>Login, delivery check-in, pickup / return, and submission flow.</p>
          <a class="wf-btn wf-btn-primary" href="wireframes/driver-login.html">Enter driver portal</a>
        </div>

        <div class="wf-choice-card">
          <h2>Admin Dashboard</h2>
          <p>Internal login, driver management, and submission review.</p>
          <a class="wf-btn wf-btn-primary" href="wireframes/admin-login.html">Enter admin portal</a>
        </div>
      </div>
    </main>

    <footer class="wf-footer">
      <a href="userflow.html">View user flow diagram →</a>
    </footer>
  </body>
</html>
