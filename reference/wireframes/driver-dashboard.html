<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Driver Dashboard — Wireframe</title>
    <link rel="stylesheet" href="wireframes.css" />
    <script src="../marker.js"></script>
  </head>
  <body class="wf-page-shell">
    <header class="wf-nav-bar">
      <a class="wf-logo" href="../index.html">
        <img src="../../public/company-logo.svg" alt="Energetic Exotics" />
      </a>
      <div class="wf-nav-actions">
        <a class="wf-btn wf-btn-ghost" href="driver-login.html">Logout</a>
        <a class="wf-btn wf-btn-ghost" href="../index.html">← Portal</a>
      </div>
    </header>

    <div class="wf-layout wf-layout-wide">
      <div class="wf-page-intro">
        <p class="wf-accent">Driver Portal</p>
        <h1 class="wf-page-title wf-page-greeting">Hello, John Davis</h1>
        <p class="wf-page-lead">What would you like to start?</p>
      </div>

      <div class="wf-choice-grid">
        <div class="wf-choice-card">
          <h2>Vehicle Delivery</h2>
          <p>Check-in form for handing the vehicle to the guest.</p>
          <a class="wf-btn wf-btn-primary" href="delivery-form.html">Start Delivery Check-In</a>
        </div>

        <div class="wf-choice-card">
          <h2>Pickup / Return</h2>
          <p>Check-out form when the guest returns the vehicle.</p>
          <a class="wf-btn wf-btn-primary" href="pickup-form.html">Start Pickup Check-Out</a>
        </div>
      </div>
    </div>

    <footer class="wf-footer">
      <a href="../userflow.html">View user flow diagram →</a>
    </footer>
  </body>
</html>
