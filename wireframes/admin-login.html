<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login — Wireframe</title>
    <link rel="stylesheet" href="wireframes.css" />
    <script src="../marker.js"></script>
  </head>
  <body class="wf-page-shell">
    <header class="wf-nav-bar">
      <a class="wf-logo" href="../index.html">
        <img src="../Company Logo.svg" alt="Energetic Exotics" />
      </a>
      <div class="wf-nav-actions">
        <a class="wf-btn wf-btn-ghost" href="../index.html">← Portal</a>
      </div>
    </header>

    <div class="wf-layout wf-layout-login">
      <div class="wf-page-intro" style="text-align: center">
        <p class="wf-accent">Admin Portal</p>
        <h1 class="wf-page-title">Admin Login</h1>
      </div>

      <div class="wf-card wf-login-card">
        <div class="wf-login-logo">
          <img src="../Company Logo.svg" alt="Energetic Exotics" />
        </div>

        <div class="wf-field">
          <label>Admin email</label>
          <div class="wf-input">admin@energeticexotics.com</div>
        </div>

        <div class="wf-field">
          <label>Password</label>
          <div class="wf-input">••••••••</div>
        </div>

        <div class="wf-actions wf-actions-center" style="margin-top: 24px">
          <a class="wf-btn wf-btn-primary" href="admin-dashboard.html" style="min-width: 100%; text-align: center">Login</a>
        </div>
      </div>

      <p class="wf-secure-notice">Internal access — authorized staff only</p>
    </div>

    <footer class="wf-footer">
      <a href="../userflow.html">View user flow diagram →</a>
    </footer>
  </body>
</html>
