<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Driver — Wireframe</title>
    <link rel="stylesheet" href="wireframes.css" />
    <script src="../marker.js"></script>
  </head>
  <body class="wf-page-shell">
    <header class="wf-nav-bar">
      <a class="wf-logo" href="../index.html">
        <img src="../Company Logo.svg" alt="Energetic Exotics" />
      </a>
      <div class="wf-nav-actions">
        <a class="wf-btn wf-btn-ghost" href="admin-manage-drivers.html">← Drivers</a>
        <a class="wf-btn wf-btn-ghost" href="../index.html">Portal</a>
      </div>
    </header>

    <div class="wf-layout">
      <div class="wf-page-intro">
        <p class="wf-accent">Admin Portal</p>
        <h1 class="wf-page-title">Create Driver</h1>
      </div>

      <section class="wf-card">
        <h2>Driver account</h2>
        <div class="wf-grid-2">
          <div class="wf-field">
            <label>First name</label>
            <div class="wf-input">First name</div>
          </div>
          <div class="wf-field">
            <label>Last name</label>
            <div class="wf-input">Last name</div>
          </div>
        </div>
        <div class="wf-field">
          <label>Email</label>
          <div class="wf-input">driver@email.com</div>
        </div>
        <div class="wf-field">
          <label>Phone (optional)</label>
          <div class="wf-input">Phone number</div>
        </div>
      </section>

      <section class="wf-card">
        <h2>Access</h2>
        <div class="wf-field">
          <label>Role</label>
          <div class="wf-input">Driver</div>
        </div>
        <div class="wf-field">
          <label>Temporary password</label>
          <div class="wf-input">••••••••</div>
        </div>
        <div class="wf-checkbox">
          <div class="wf-checkbox-box"></div>
          <span>Require password change on first login</span>
        </div>
        <div class="wf-checkbox">
          <div class="wf-checkbox-box"></div>
          <span>Send login details to driver by email</span>
        </div>
      </section>

      <div class="wf-actions">
        <a class="wf-btn wf-btn-primary" href="admin-manage-drivers.html">Save driver</a>
        <a class="wf-btn wf-btn-ghost" href="admin-manage-drivers.html">Cancel</a>
      </div>
    </div>

    <footer class="wf-footer">
      <a href="../userflow.html">View user flow diagram →</a>
    </footer>
  </body>
</html>
